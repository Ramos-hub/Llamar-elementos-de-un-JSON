<!DOCTYPE html>
<html lang="es" xmlns:mso="urn:schemas-microsoft-com:office:office"
    xmlns:msdt="uuid:C2F41010-65B3-11d1-A29F-00AA00C14882">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mostrar JSON en Tabla</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <main class="container py-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h1 class="h4 mb-0">Lista de Docentes</h1>
            </div>

            <div class="card-body">

                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Nombre</th>
                                <th>Apellido</th>
                                <th>Grado</th>
                                <th>Edad</th>
                                <th colspan="2">Módulos</th>
                            </tr>
                        </thead>

                        <tbody id="tablaProfesores">
                            <!-- Aquí se cargarán los datos con JavaScript -->
                        </tbody>
                    </table>

                    <section>
                        <h2 class="fs-4 my-5 text-center">Agregar nuevo Profesor</h2>
                        <div class="form-group my-4">
                            <label for="txtNombre" class="form-label">Nombre del Docente</label>
                            <input type="text" id="txtNombre" class="form-control" placeholder="Ingresa el nombre del Docente">
                        </div>
                        <div class="form-group my-4">
                            <label for="txtApellido" class="form-label">Apellido del Docente</label>
                            <input type="text" id="txtApellido" class="form-control" placeholder="Ingresa el apellido del Docente">
                        </div>
                        <div class="form-group my-4">
                            <label for="txtGrado" class="form-label">Grado del Docente</label>
                            <input type="text" id="txtGrado" class="form-control" placeholder="Ingresa el grado del Docente">
                        </div>
                        <div class="form-group my-4">
                            <label for="txtEdad" class="form-label">Edad del Docente</label>
                            <input type="number" id="txtEdad" class="form-control" min="0" placeholder="Ingresa la edad del Docente">
                        </div>
                        <div class="form-group my-4">
                            <label for="txtModulo1" class="form-label">Módulo 1</label>
                            <input type="text" id="txtModulo1" class="form-control" placeholder="Ingresa el primer Módulo del Docente">
                        </div>
                        <div class="form-group my-4">
                            <label for="txtModulo2" class="form-label">Módulo 2</label>
                            <input type="text" id="txtModulo2" class="form-control" placeholder="Ingresa el segundo Módulo del Docente">
                        </div>
                        <button class="btn btn-dark" id="btnAgregar">Agregar Profesor</button>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <script src="JS/script.js"></script>
</body>

</html>
